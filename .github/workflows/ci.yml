name: ci

on:
  push:
    branches: [main]
    tags:
      - "v*"
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Restore
        run: dotnet restore .\CodexResetTray.slnx

      - name: Build
        run: dotnet build .\CodexResetTray.slnx -c Release --no-restore

      - name: Test
        run: dotnet test .\CodexResetTray.slnx -c Release --no-build

      - name: Test publish script failure handling
        run: pwsh -NoProfile -File .\tests\packaging\Verify-PublishNativeFailure.ps1

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Validate release tag
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $tag = "${{ github.ref_name }}"
          $project = [xml](Get-Content -LiteralPath ".\src\CodexResetTray.App\CodexResetTray.App.csproj")
          $version = $project.Project.PropertyGroup.Version
          $escapedVersion = [regex]::Escape($version)

          if ($tag -ne "v$version") {
              throw "Release tag $tag does not match project version v$version."
          }

          if (-not (Select-String -LiteralPath ".\CHANGELOG.md" -Pattern "## \[$escapedVersion\]" -Quiet)) {
              throw "CHANGELOG.md does not contain a $version release section."
          }

      - name: Package portable app
        run: pwsh -NoProfile -File .\packaging\publish.ps1

      - name: Generate checksum
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $zipPath = "artifacts\release\CodexResetTray-win-x64.zip"
          $shaPath = "$zipPath.sha256"
          $hash = (Get-FileHash -LiteralPath $zipPath -Algorithm SHA256).Hash.ToLowerInvariant()
          Set-Content -LiteralPath $shaPath -Value "$hash  CodexResetTray-win-x64.zip"

      - name: Upload portable app artifact
        uses: actions/upload-artifact@v4
        with:
          name: CodexResetTray-win-x64
          path: |
            artifacts\release\CodexResetTray-win-x64.zip
            artifacts\release\CodexResetTray-win-x64.zip.sha256
          if-no-files-found: error
          retention-days: 14

      - name: Create GitHub release
        shell: pwsh
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $ErrorActionPreference = "Stop"
          $tag = "${{ github.ref_name }}"
          $zipPath = "artifacts\release\CodexResetTray-win-x64.zip"
          $shaPath = "$zipPath.sha256"
          $hash = (Get-Content -LiteralPath $shaPath -Raw).Trim().Split(" ")[0]

          @(
              "## Codex Reset Tray $tag",
              "",
              "Portable Windows x64 build.",
              "",
              "This build is currently unsigned, so Windows SmartScreen may warn on first launch.",
              "",
              "SHA256: $hash",
              "",
              "See CHANGELOG.md for the full changelog."
          ) | Set-Content -LiteralPath release-notes.md

          gh release view $tag *> $null
          if ($LASTEXITCODE -eq 0) {
              throw "Release $tag already exists; refusing to overwrite release assets."
          }

          gh release create $tag $zipPath $shaPath --title $tag --notes-file release-notes.md --verify-tag
          if ($LASTEXITCODE -ne 0) {
              throw "gh release create failed with exit code $LASTEXITCODE."
          }
